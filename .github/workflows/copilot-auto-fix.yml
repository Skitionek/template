name: Copilot Auto-Fix on CI Failure

on:
  workflow_run:
    workflows:
      - Tests
    types:
      - completed

jobs:
  request-copilot-fix:
    name: Request Copilot Fix
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event == 'pull_request' }}
    permissions:
      pull-requests: write

    steps:
      - name: Comment on PR asking Copilot to fix
        uses: actions/github-script@v7
        with:
          script: |
            const workflowRun = context.payload.workflow_run;

            if (!workflowRun.pull_requests || workflowRun.pull_requests.length === 0) {
              core.info('No pull requests associated with this workflow run. Skipping.');
              return;
            }

            const prNumber = workflowRun.pull_requests[0].number;

            const jobsResponse = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: workflowRun.id,
            });

            const failedJobs = jobsResponse.data.jobs
              .filter(j => j.conclusion === 'failure')
              .map(j => `- **${j.name}**: ${j.html_url}`)
              .join('\n');

            const jobsSection = failedJobs
              ? `\n\n**Failed jobs:**\n${failedJobs}`
              : '';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `@copilot The CI pipeline **${workflowRun.name}** has failed on this PR. Please analyze the failure and suggest a fix.${jobsSection}\n\nWorkflow run: ${workflowRun.html_url}`
            });

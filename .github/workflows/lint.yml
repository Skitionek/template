name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Default to read-only; individual jobs grant only the permissions they need.
permissions: read-all

jobs:
  megalinter:
    name: MegaLinter
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to commit auto-fixes
      issues: write
      pull-requests: write
      security-events: write # needed to upload SARIF

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Detect MegaLinter flavor
        id: detect_flavor
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD 2>/dev/null || true)
          else
            CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || true)
          fi
          echo "Changed files:"
          echo "${CHANGED:-<none>}"
          LANGS=()
          if [[ -n "$CHANGED" ]]; then
            grep -qiE '\.(py|ipynb|pyx|pyi)$'                <<< "$CHANGED" && LANGS+=(python)
            grep -qiE '\.(js|ts|jsx|tsx|mjs|cjs|vue|svelte)$' <<< "$CHANGED" && LANGS+=(javascript)
            grep -qiE '\.java$'                                <<< "$CHANGED" && LANGS+=(java)
            grep -qiE '\.go$'                                  <<< "$CHANGED" && LANGS+=(go)
            grep -qiE '\.rb$'                                  <<< "$CHANGED" && LANGS+=(ruby)
            grep -qiE '\.php$'                                 <<< "$CHANGED" && LANGS+=(php)
            grep -qiE '\.rs$'                                  <<< "$CHANGED" && LANGS+=(rust)
            grep -qiE '\.(cs|vb|fs|fsx)$'                     <<< "$CHANGED" && LANGS+=(dotnet)
            grep -qiE '\.(tf|tfvars)$'                         <<< "$CHANGED" && LANGS+=(terraform)
            grep -qiE '\.swift$'                               <<< "$CHANGED" && LANGS+=(swift)
          fi
          if [[ ${#LANGS[@]} -eq 1 ]]; then
            FLAVOR="${LANGS[0]}"
          else
            FLAVOR="all"
          fi
          echo "Detected flavor: $FLAVOR (matched languages: ${LANGS[*]:-none})"
          echo "flavor=$FLAVOR" >> "$GITHUB_OUTPUT"

      - name: Run MegaLinter (all)
        id: ml_all
        if: steps.detect_flavor.outputs.flavor == 'all'
        uses: oxsecurity/megalinter@v8
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'push' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_COMMENT_REPORTER: false
          SARIF_REPORTER: true

      - name: Run MegaLinter (python)
        id: ml_python
        if: steps.detect_flavor.outputs.flavor == 'python'
        uses: oxsecurity/megalinter/flavors/python@v8
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'push' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_COMMENT_REPORTER: false
          SARIF_REPORTER: true

      - name: Run MegaLinter (javascript)
        id: ml_javascript
        if: steps.detect_flavor.outputs.flavor == 'javascript'
        uses: oxsecurity/megalinter/flavors/javascript@v8
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'push' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_COMMENT_REPORTER: false
          SARIF_REPORTER: true

      - name: Run MegaLinter (java)
        id: ml_java
        if: steps.detect_flavor.outputs.flavor == 'java'
        uses: oxsecurity/megalinter/flavors/java@v8
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'push' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_COMMENT_REPORTER: false
          SARIF_REPORTER: true

      - name: Run MegaLinter (go)
        id: ml_go
        if: steps.detect_flavor.outputs.flavor == 'go'
        uses: oxsecurity/megalinter/flavors/go@v8
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'push' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_COMMENT_REPORTER: false
          SARIF_REPORTER: true

      - name: Run MegaLinter (ruby)
        id: ml_ruby
        if: steps.detect_flavor.outputs.flavor == 'ruby'
        uses: oxsecurity/megalinter/flavors/ruby@v8
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'push' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_COMMENT_REPORTER: false
          SARIF_REPORTER: true

      - name: Run MegaLinter (php)
        id: ml_php
        if: steps.detect_flavor.outputs.flavor == 'php'
        uses: oxsecurity/megalinter/flavors/php@v8
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'push' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_COMMENT_REPORTER: false
          SARIF_REPORTER: true

      - name: Run MegaLinter (rust)
        id: ml_rust
        if: steps.detect_flavor.outputs.flavor == 'rust'
        uses: oxsecurity/megalinter/flavors/rust@v8
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'push' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_COMMENT_REPORTER: false
          SARIF_REPORTER: true

      - name: Run MegaLinter (dotnet)
        id: ml_dotnet
        if: steps.detect_flavor.outputs.flavor == 'dotnet'
        uses: oxsecurity/megalinter/flavors/dotnet@v8
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'push' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_COMMENT_REPORTER: false
          SARIF_REPORTER: true

      - name: Run MegaLinter (terraform)
        id: ml_terraform
        if: steps.detect_flavor.outputs.flavor == 'terraform'
        uses: oxsecurity/megalinter/flavors/terraform@v8
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'push' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_COMMENT_REPORTER: false
          SARIF_REPORTER: true

      - name: Run MegaLinter (swift)
        id: ml_swift
        if: steps.detect_flavor.outputs.flavor == 'swift'
        uses: oxsecurity/megalinter/flavors/swift@v8
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'push' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_COMMENT_REPORTER: false
          SARIF_REPORTER: true

      # Derive has_updated_sources from git status so downstream steps work
      # regardless of which flavor step ran above.
      - name: Collect MegaLinter result
        id: ml
        run: |
          if git diff --quiet; then
            echo "has_updated_sources=0" >> "$GITHUB_OUTPUT"
          else
            echo "has_updated_sources=1" >> "$GITHUB_OUTPUT"
          fi

      # ── Auto-fix pull request (PR only) ───────────────────────────────────
      - name: Set fix-PR flag
        id: fix_check
        env:
          HAS_UPDATES: ${{ steps.ml.outputs.has_updated_sources }}
          IS_PR: ${{ github.event_name == 'pull_request' }}
          SAME_REPO: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
          SKIP_FIX: ${{ contains(github.event.head_commit.message, 'skip fix') }}
        run: |
          if [[ "$HAS_UPDATES" == "1" && "$IS_PR" == "true" && "$SAME_REPO" == "true" && "$SKIP_FIX" != "true" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request with applied fixes
        uses: peter-evans/create-pull-request@v7
        id: cpr
        if: steps.fix_check.outputs.enabled == 'true'
        with:
          # PAT (Personal Access Token) is required when you want the auto-fix PR to
          # trigger other workflows (e.g. CI). GITHUB_TOKEN-created PRs do not trigger
          # workflow runs by default to avoid infinite loops.
          # Add a repository secret named PAT with a token that has `repo` scope.
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
          commit-message: "[MegaLinter] Apply linters automatic fixes"
          title: "[MegaLinter] Apply linters automatic fixes"
          labels: bot
          branch: megalinter-fixes-pr-${{ github.event.pull_request.number }}
          body: |
            MegaLinter has automatically applied linters fixes on this PR.
            Please review the changes and merge if they are correct.
          base: ${{ github.head_ref }}

      - name: Post PR Comment
        if: steps.fix_check.outputs.enabled == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            MegaLinter has automatically applied linters fixes on this PR.
            Please review the changes and merge if they are correct.
            PR: ${{ steps.cpr.outputs.pull-request-url }}
          hide_and_recreate: true

      - name: Fail if PR Created
        if: steps.fix_check.outputs.enabled == 'true' && steps.cpr.outputs.pull-request-url != ''
        run: |
          echo "A PR with formatting fixes has been created. Please merge it before proceeding."
          echo "PR: ${{ steps.cpr.outputs.pull-request-url }}"
          exit 1

      # ── Upload SARIF for PR annotations ───────────────────────────────────
      - name: Upload SARIF report
        if: >
          (github.event_name == 'pull_request' || github.event_name == 'push') &&
          always()
        uses: github/codeql-action/upload-sarif@v3
        # continue-on-error so the job doesn't fail when SARIF wasn't produced
        # (e.g. no linting errors were found, or the reporter was not enabled).
        continue-on-error: true
        with:
          sarif_file: megalinter-reports/megalinter-report.sarif
          category: megalinter

name: "CodeQL Advanced"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "36 0 * * 0"

permissions: read-all

jobs:
  # Check whether Code scanning is enabled before running the expensive analysis.
  # The GitHub API returns 403 when the feature is disabled; any other successful
  # response (even an empty list) means it IS enabled.
  check-code-scanning:
    name: Check Code Scanning enabled
    runs-on: ubuntu-latest
    permissions:
      security-events: read
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Check via API
        id: check
        uses: actions/github-script@v9
        with:
          script: |
            try {
              await github.rest.codeScanning.listAlertsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 1,
              });
              core.setOutput('enabled', 'true');
            } catch (err) {
              if (err.status === 403) {
                core.warning('Code scanning is not enabled for this repository — skipping CodeQL analysis.');
                core.setOutput('enabled', 'false');
              } else {
                // Any other error (e.g. 404 empty repo) — still try to run.
                core.setOutput('enabled', 'true');
              }
            }

  analyze:
    name: Analyze (${{ matrix.language }})
    needs: check-code-scanning
    if: needs.check-code-scanning.outputs.enabled == 'true'
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          # Uncomment and add languages relevant to your project:
          # - language: javascript-typescript
          #   build-mode: none
          # - language: python
          #   build-mode: none
          # - language: java-kotlin
          #   build-mode: none
          # - language: go
          #   build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Run manual build steps
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          echo 'Replace this with your project build commands, for example:'
          echo '  make bootstrap'
          echo '  make release'
          exit 1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v3
        with:
          category: "/language:${{matrix.language}}"

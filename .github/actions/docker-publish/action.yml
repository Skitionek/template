name: 'Docker build and publish'
description: 'Builds and publishes a Docker image to GitHub Container Registry (or a custom registry).'

inputs:
  registry:
    description: 'Server address of the Docker registry'
    default: ghcr.io
    required: false
  image:
    description: 'Docker image name (e.g. ghcr.io/owner/image)'
    required: true
  username:
    description: 'Username to log in to the Docker registry'
    default: ${{ github.actor }}
    required: false
  password:
    description: 'Password or token to log in to the Docker registry'
    default: ${{ github.token }}
    required: false
  dockerfile:
    description: 'Path to the Dockerfile'
    required: false
    default: './Dockerfile'
  context:
    description: 'Docker build context'
    required: false
    default: '.'
  push:
    description: 'Whether to push the image to the registry'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Docker meta
      id: docker_meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.image }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to registry
      if: github.event_name != 'pull_request' && inputs.username != '' && inputs.password != ''
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        file: ${{ inputs.dockerfile }}
        context: ${{ inputs.context }}
        tags: ${{ steps.docker_meta.outputs.tags }}
        labels: ${{ steps.docker_meta.outputs.labels }}
        push: ${{ inputs.push }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
